<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 130" width="600" height="130">
  <rect width="600" height="130" rx="10" fill="white" stroke="#CCCCCC" stroke-width="2"/>

  <!-- Stripe logo -->
  <text x="24" y="42" font-family="Arial, sans-serif" font-weight="900" font-size="32" fill="#635BFF">stripe</text>

  <!-- Divider line from stripe text -->
  <line x1="120" y1="28" x2="580" y2="28" stroke="#CCCCCC" stroke-width="1.5"/>

  <!-- VISA -->
  <g transform="translate(24, 58)">
    <rect width="116" height="54" rx="6" fill="#1A1F71"/>
    <text x="58" y="38" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="white" text-anchor="middle" letter-spacing="-2">VISA</text>
  </g>

  <!-- MasterCard -->
  <g transform="translate(154, 58)">
    <rect width="116" height="54" rx="6" fill="#1A1A1A"/>
    <circle cx="44" cy="27" r="22" fill="#EB001B"/>
    <circle cx="72" cy="27" r="22" fill="#F79E1B"/>
    <path d="M58 9.5 A22 22 0 0 1 58 44.5 A22 22 0 0 1 58 9.5Z" fill="#FF5F00"/>
    <text x="58" y="52" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">MasterCard</text>
  </g>

  <!-- Maestro -->
  <g transform="translate(284, 58)">
    <rect width="116" height="54" rx="6" fill="#E8E8E8"/>
    <circle cx="44" cy="27" r="22" fill="#009BE1"/>
    <circle cx="72" cy="27" r="22" fill="#CC0000" opacity="0.85"/>
    <text x="58" y="52" font-family="Arial, sans-serif" font-weight="700" font-size="8" fill="#333" text-anchor="middle">Maestro</text>
  </g>

  <!-- American Express -->
  <g transform="translate(414, 58)">
    <rect width="162" height="54" rx="6" fill="#2E77BC"/>
    <text x="81" y="24" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="white" text-anchor="middle">AMERICAN</text>
    <text x="81" y="38" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="white" text-anchor="middle">EXPRESS</text>
    <text x="81" y="50" font-family="Arial, sans-serif" font-size="7" fill="#CCE5FF" text-anchor="middle">Don't leave home without it</text>
  </g>
</svg>
